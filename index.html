<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99 Nights 2D - Protect & Build</title>
    <style>
        body {
            margin: 0;
            background-color: #05070a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .screen {
            position: absolute;
            background: radial-gradient(circle, #111827 0%, #030712 100%);
            width: 900px;
            height: 650px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            border: 2px solid #1f2937;
        }
        .btn {
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin: 8px;
            width: 280px;
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
        }
        .btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
        select, input {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #374151;
            background-color: #1f2937;
            color: white;
            margin: 8px;
            width: 260px;
            text-align: center;
            outline: none;
        }
        #gameUi {
            display: none;
            position: absolute;
            top: 20px;
            justify-content: space-between;
            width: 900px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        #buildUi {
            position: absolute;
            bottom: 20px;
            background: rgba(17, 24, 39, 0.85);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid #374151;
            display: none;
            z-index: 10;
            pointer-events: none;
        }
        canvas {
            border: 4px solid #1f2937;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            cursor: crosshair;
            background-color: #0b1329;
        }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="accountScreen" class="screen" style="display: none;">
        <h2 id="accountTitle" style="font-size: 32px; color: #60a5fa; margin-bottom: 5px;">Connexion Securisée</h2>
        <p style="color: #9ca3af; margin-bottom: 20px;">Rentre tes identifiants locaux</p>
        <input type="text" id="usernameInput" placeholder="Pseudo" maxlength="15">
        <input type="password" id="passwordInput" placeholder="Mot de passe">
        <button class="btn" onclick="handleAccount()">Valider</button>
    </div>

    <div id="mainMenu" class="screen" style="display: none;">
        <h1 style="font-size: 42px; margin-bottom: 10px; color: #f3f4f6; letter-spacing: 2px;">99 NIGHTS 2D</h1>
        <p id="playerTag" style="color: #10b981; font-weight: bold; margin-bottom: 30px;"></p>
        
        <label for="difficultySelect" style="color: #9ca3af;">Difficulté :</label>
        <select id="difficultySelect">
            <option value="easy">Facile</option>
            <option value="normal">Normal</option>
            <option value="hard">Hard</option>
        </select>

        <button class="btn" style="background-color: #10b981;" onclick="startSolo()">Mode Solo</button>
        <button class="btn" style="background-color: #6366f1;" onclick="startMultiplayer()">Lancer Multijoueur</button>
        <button class="btn" style="background-color: #4b5563; width: 220px; font-size: 14px;" onclick="clearAccount()">Changer de compte</button>
    </div>

    <div id="gameUi">
        <div id="healthUi">❤️ PV: 999</div>
        <div id="woodUi">🪵 Bois: 0</div>
        <div id="fireUi">🔥 Feu: 100%</div>
        <div id="nightUi">⏳ État: Jour</div>
        <button class="btn" style="pointer-events: auto; width: 180px; font-size: 12px; padding: 8px; margin: 0; background-color: #f59e0b;" onclick="copyInviteLink()">🔗 Inviter un ami</button>
    </div>

    <div id="buildUi">Marteau [E] : Mode Actif (Clic pour poser) | Sélection : <span id="buildType" style="color:#38bdf8; font-weight:bold;">MUR (2 Bois)</span></div>

    <div id="gameOverScreen" class="screen" style="display: none;">
        <h1 style="color: #ef4444; font-size: 50px; margin-bottom: 10px;">LA FORÊT VOUS A REPRIS</h1>
        <button class="btn" onclick="location.reload()">Retour au Menu</button>
    </div>

    <canvas id="gameCanvas" width="900" height="650"></canvas>

    <script>
        // /!\ REMPLACE PAR TON VRAI LIEN RENDER ICI /!\
        const socket = io("https://TON-LIEN-RENDER.onrender.com");

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const healthUi = document.getElementById("healthUi");
        const woodUi = document.getElementById("woodUi");
        const fireUi = document.getElementById("fireUi");
        const nightUi = document.getElementById("nightUi");
        const buildUi = document.getElementById("buildUi");
        const buildTypeUi = document.getElementById("buildType");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const mainMenu = document.getElementById("mainMenu");
        const accountScreen = document.getElementById("accountScreen");

        let gameActive = false;
        let isMultiplayer = false;
        let woodCount = 0;
        let cycleTimer = 0; 
        let isNight = false;
        let nightCounter = 1;
        let spawnTimer = 0;
        let difficulty = "easy";

        // Variables de construction
        let buildMode = false;
        let selectedStructure = "wall"; // ou "turret"

        const keys = {};
        const mouse = { x: 0, y: 0 };

        let player;
        let otherPlayers = {};
        let campFire;
        let trees = [];
        let enemies = [];
        let particles = [];
        let structures = []; // Contient les murs et arbalètes posés

        // --- COMPTE ET SECURITE SECURISEE LOCALSTORAGE ---
        function checkAccount() {
            let savedName = localStorage.getItem("survivorName");
            if (!savedName) {
                document.getElementById("accountTitle").innerText = "Créer un Compte";
                accountScreen.style.display = "flex";
            } else {
                document.getElementById("accountTitle").innerText = "Connexion Requise";
                accountScreen.style.display = "flex";
            }
        }

        function handleAccount() {
            let nameInput = document.getElementById("usernameInput").value.trim();
            let passInput = document.getElementById("passwordInput").value;

            if (nameInput === "" || passInput === "") {
                alert("Remplis toutes les cases !");
                return;
            }

            let savedName = localStorage.getItem("survivorName");
            let savedPass = localStorage.getItem("survivorPass");

            if (!savedName) {
                // Inscription
                localStorage.setItem("survivorName", nameInput);
                localStorage.setItem("survivorPass", passInput);
                alert("Compte créé avec succès !");
            } else {
                // Connexion
                if (nameInput !== savedName || passInput !== savedPass) {
                    alert("Pseudo ou mot de passe incorrect !");
                    return;
                }
            }
            accountScreen.style.display = "none";
            document.getElementById("playerTag").innerText = `👤 Connecté : ${nameInput}`;
            mainMenu.style.display = "flex";
        }

        function clearAccount() {
            localStorage.removeItem("survivorName");
            localStorage.removeItem("survivorPass");
            mainMenu.style.display = "none";
            checkAccount();
        }

        function copyInviteLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Lien copié ! Tes amis arriveront directement sur ton jeu.");
        }

        // --- GESTION DES COLLISIONS SOLIDES ---
        function checkSolidCollision(x, y, radius, ignoreStructures = false) {
            // Collision avec les bords de la map
            if (x - radius < 0 || x + radius > canvas.width || y - radius < 0 || y + radius > canvas.height) return true;

            // Collision avec le feu de camp
            if (Math.hypot(campFire.x - x, campFire.y - y) < radius + campFire.radius) return true;

            // Collision avec les arbres (Infranchissables)
            for (let tree of trees) {
                if (Math.hypot(tree.x - x, tree.y - y) < radius + 15) return true; 
            }

            // Collision avec les structures (Murs et Arbalètes)
            if (!ignoreStructures) {
                for (let struct of structures) {
                    if (Math.hypot(struct.x - x, struct.y - y) < radius + struct.radius) return true;
                }
            }
            return false;
        }

        class Player {
            constructor(x, y, name = "Moi", color = "#3b82f6") {
                this.x = x; this.y = y;
                this.radius = 16; this.speed = 5.5; this.hp = 999;
                this.angle = 0; this.tool = 'axe';
                this.color = color; this.name = name;
                this.isSwinging = false; this.swingAngle = 0; this.swingDir = 1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = "white"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(this.name, 0, -this.radius - 8);
                ctx.rotate(this.angle);
                ctx.beginPath(); ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.arc(3, 3, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.fillStyle = this.color; ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#60a5fa"; ctx.fillRect(4, -4, 10, 8);

                if (buildMode) {
                    ctx.fillStyle = "#f59e0b"; ctx.fillRect(8, -8, 6, 16); // Look Marteau
                } else if (this.tool === 'axe') {
                    ctx.save(); if (this.isSwinging) ctx.rotate(this.swingAngle);
                    ctx.fillStyle = "#b45309"; ctx.fillRect(10, -3, 22, 5);
                    ctx.fillStyle = "#cbd5e1"; ctx.fillRect(26, -11, 8, 18); ctx.restore();
                } else {
                    ctx.fillStyle = "#1f2937"; ctx.fillRect(5, -5, 26, 10);
                }
                ctx.restore();
            }

            update() {
                let nextX = this.x;
                let nextY = this.y;

                if (keys['z'] || keys['w'] || keys['arrowup']) nextY -= this.speed;
                if (keys['s'] || keys['arrowdown']) nextY += this.speed;
                if (keys['q'] || keys['a'] || keys['arrowleft']) nextX -= this.speed;
                if (keys['d'] || keys['arrowright']) nextX += this.speed;

                // Application du mouvement uniquement si le chemin n'est pas bloqué par un arbre/mur
                if (!checkSolidCollision(nextX, this.y, this.radius)) this.x = nextX;
                if (!checkSolidCollision(this.x, nextY, this.radius)) this.y = nextY;

                this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);

                if (isMultiplayer) {
                    socket.emit('playerMovement', { x: this.x, y: this.y, angle: this.angle, tool: buildMode ? 'build' : this.tool, name: this.name });
                }

                if (this.isSwinging) {
                    this.swingAngle += 0.25 * this.swingDir;
                    if (this.swingAngle > 1.2) this.swingDir = -1;
                    if (this.swingAngle < -0.5) { this.isSwinging = false; this.swingAngle = 0; this.swingDir = 1; }
                }
            }
        }

        // --- CLASSE STRUCTURES (CONSTRUCTION) ---
        class Structure {
            constructor(x, y, type) {
                this.x = x; this.y = y;
                this.type = type; // "wall" ou "turret"
                this.radius = type === "wall" ? 18 : 16;
                this.cooldown = 0;
            }
            draw() {
                ctx.save();
                if (this.type === "wall") {
                    // Dessin d'un mur de fortification en bois renforcé
                    ctx.fillStyle = "#7c2d12";
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#9a3412";
                    ctx.fillRect(this.x - 12, this.y - 12, 24, 24);
                } else {
                    // Dessin de l'Arbalète automatique
                    ctx.fillStyle = "#4b5563";
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#f59e0b"; // Arc en métal dorée
                    ctx.fillRect(this.x - 4, this.y - 14, 8, 28);
                    ctx.fillStyle = "#1f2937";
                    ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
            update() {
                if (this.type === "turret" && isNight) {
                    this.cooldown++;
                    if (this.cooldown > 50) { // Fréquence de tir
                        // Trouver l'ennemi le plus proche
                        let target = null;
                        let minDist = 300;
                        for (let enemy of enemies) {
                            let d = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                            if (d < minDist) { minDist = d; target = enemy; }
                        }
                        if (target) {
                            createExplosion(this.x, this.y, "#fbbf24");
                            target.hp -= 10;
                            if (target.hp <= 0) {
                                let idx = enemies.indexOf(target);
                                if (idx > -1) enemies.splice(idx, 1);
                            }
                            this.cooldown = 0;
                        }
                    }
                }
            }
        }

        class CampFire {
            constructor(x, y) { this.x = x; this.y = y; this.radius = 24; this.fuel = 100; }
            draw() {
                let gradient = ctx.createRadialGradient(this.x, this.y, 5, this.x, this.y, this.fuel * 2.8);
                gradient.addColorStop(0, `rgba(249, 115, 22, ${isNight ? 0.5 : 0.25})`);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(this.x, this.y, this.fuel * 2.8, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius - 4, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                let burnRate = difficulty === "easy" ? 0.01 : (difficulty === "normal" ? 0.02 : 0.05);
                if (this.fuel > 0) this.fuel -= isNight ? burnRate * 2 : burnRate;
                fireUi.innerText = `🔥 Feu: ${Math.floor(this.fuel)}%`;
            }
        }

        class Tree {
            constructor(x, y) { this.x = x; this.y = y; this.radius = 28; this.hp = 2; }
            draw() {
                ctx.beginPath(); ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.arc(this.x + 6, this.y + 10, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.fillStyle = "#451a03"; ctx.arc(this.x, this.y, 14, 0, Math.PI * 2); ctx.fill(); // Tronc large solide
                ctx.beginPath(); ctx.fillStyle = "#065f46"; ctx.arc(this.x, this.y - 4, this.radius, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Enemy {
            constructor(x, y) { 
                this.x = x; this.y = y; this.radius = 14; 
                this.speed = difficulty === "easy" ? 1.0 : (difficulty === "normal" ? 2.0 : 3.0); 
                this.hp = 20; 
            }
            draw() {
                ctx.beginPath(); ctx.fillStyle = "#9333ea"; ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                // Les monstres ciblent le joueur
                let dx = player.x - this.x, dy = player.y - this.y, dist = Math.hypot(dx, dy);
                let nextX = this.x + (dx / dist) * this.speed;
                let nextY = this.y + (dy / dist) * this.speed;

                // Les monstres ont aussi des collisions physiques solides avec la nature/murs
                if (!checkSolidCollision(nextX, this.y, this.radius)) this.x = nextX;
                if (!checkSolidCollision(this.x, nextY, this.radius)) this.y = nextY;

                if (dist < this.radius + player.radius) {
                    player.hp -= difficulty === "easy" ? 0.5 : 2;
                    healthUi.innerText = `❤️ PV: ${Math.max(0, Math.floor(player.hp))}`;
                    if (player.hp <= 0) endGame();
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 2.5 + 1;
                this.dx = (Math.random() - 0.5) * 4; this.dy = (Math.random() - 0.5) * 4;
                this.alpha = 1; this.decay = 0.03;
            }
            draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); }
            update() { this.x += this.dx; this.y += this.dy; this.alpha -= this.decay; }
        }

        function createExplosion(x, y, color) { for (let i = 0; i < 5; i++) particles.push(new Particle(x, y, color)); }
        
        function spawnTree() { 
            let rx = Math.random() * 800 + 50;
            let ry = Math.random() * 550 + 50;
            if (!checkSolidCollision(rx, ry, 30)) trees.push(new Tree(rx, ry));
        }

        function startSolo() { difficulty = document.getElementById("difficultySelect").value; mainMenu.style.display = "none"; document.getElementById("gameUi").style.display = "flex"; isMultiplayer = false; resetGame(); }
        function startMultiplayer() { difficulty = document.getElementById("difficultySelect").value; mainMenu.style.display = "none"; document.getElementById("gameUi").style.display = "flex"; isMultiplayer = true; resetGame(); }

        // --- ECOUTES RESEAU CORRIGEES ---
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) otherPlayers[id] = new Player(players[id].x, players[id].y, players[id].name || "Allié", "#10b981");
            });
        });
        socket.on('newPlayer', (p) => { otherPlayers[p.id] = new Player(p.x, p.y, p.name || "Allié", "#10b981"); });
        socket.on('playerMoved', (p) => { if (otherPlayers[p.id]) { otherPlayers[p.id].x = p.x; otherPlayers[p.id].y = p.y; otherPlayers[p.id].angle = p.angle; otherPlayers[p.id].tool = p.tool; if(p.name) otherPlayers[p.id].name = p.name; } });
        socket.on('playerDisconnected', (id) => delete otherPlayers[id]);

        // --- BOUCLE DE SIMULATION ---
        function gameLoop() {
            ctx.fillStyle = "#09111e"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                cycleTimer++;
                if (cycleTimer > 900) {
                    isNight = !isNight; cycleTimer = 0;
                    if (isNight) { player.tool = 'gun'; nightUi.innerText = `🌙 Nuit ${nightCounter}`; }
                    else { player.tool = 'axe'; nightCounter++; nightUi.innerText = `☀️ Jour`; while(trees.length < 5) spawnTree(); }
                }

                if (isNight) {
                    spawnTimer++;
                    let rate = difficulty === "easy" ? 100 : (difficulty === "normal" ? 50 : 25);
                    if (spawnTimer > rate) { enemies.push(new Enemy(Math.random() * canvas.width, -10)); spawnTimer = 0; }
                }

                campFire.update(); campFire.draw();
                trees.forEach(tree => tree.draw());
                structures.forEach(struct => { struct.update(); struct.draw(); });
                
                Object.keys(otherPlayers).forEach((id) => otherPlayers[id].draw());
                player.update(); player.draw();

                for (let i = enemies.length - 1; i >= 0; i--) { enemies[i].update(); enemies[i].draw(); }
                for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].alpha <= 0) particles.splice(i, 1); }
            }
            requestAnimationFrame(gameLoop);
        }

        // --- INTERACTION ET CONSTRUCTION ---
        canvas.addEventListener('mousedown', () => {
            if (!gameActive) return;

            // SI MODE CONSTRUCTION ACTIVE
            if (buildMode) {
                let cost = selectedStructure === "wall" ? 2 : 5;
                if (woodCount < cost) { alert("Pas assez de bois !"); return; }
                
                // On vérifie qu'on ne pose pas la structure sur un obstacle solide déjà existant
                if (!checkSolidCollision(mouse.x, mouse.y, 16)) {
                    structures.push(new Structure(mouse.x, mouse.y, selectedStructure));
                    woodCount -= cost;
                    woodUi.innerText = `🪵 Bois: ${woodCount}`;
                    createExplosion(mouse.x, mouse.y, "#92400e");
                }
                return;
            }

            // MODE STANDARD (HACHE / LASER)
            if (!isNight) {
                player.isSwinging = true;
                if (Math.hypot(campFire.x - player.x, campFire.y - player.y) < 60 && woodCount > 0) {
                    woodCount--; campFire.fuel = Math.min(100, campFire.fuel + 20); return;
                }
                for (let i = trees.length - 1; i >= 0; i--) {
                    if (Math.hypot(trees[i].x - player.x, trees[i].y - player.y) < 55) {
                        trees[i].hp--; createExplosion(trees[i].x, trees[i].y, "#92400e");
                        if (trees[i].hp <= 0) { trees.splice(i, 1); woodCount += 3; woodUi.innerText = `🪵 Bois: ${woodCount}`; }
                        break;
                    }
                }
            } else {
                createExplosion(player.x + Math.cos(player.angle)*25, player.y + Math.sin(player.angle)*25, "#38bdf8");
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let diffAngle = Math.abs(player.angle - Math.atan2(enemies[i].y - player.y, enemies[i].x - player.x));
                    if (diffAngle < 0.35 && Math.hypot(enemies[i].x - player.x, enemies[i].y - player.y) < 380) {
                        enemies.splice(i, 1); break;
                    }
                }
            }
        });

        // Touches clavier spéciales pour la construction
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            // Appuyer sur 'E' active / désactive le mode marteau de construction
            if (e.key.toLowerCase() === 'e' && gameActive) {
                buildMode = !buildMode;
                buildUi.style.display = buildMode ? "block" : "none";
            }
            // Appuyer sur 'R' change la structure choisie (Mur ou Arbalète)
            if (e.key.toLowerCase() === 'r' && buildMode) {
                selectedStructure = selectedStructure === "wall" ? "turret" : "wall";
                buildTypeUi.innerText = selectedStructure === "wall" ? "MUR (2 Bois)" : "ARBALÈTE AUTO (5 Bois)";
                buildTypeUi.style.color = selectedStructure === "wall" ? "#38bdf8" : "#f59e0b";
            }
        });

        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener('mousemove', (e) => { const rect = canvas.getBoundingClientRect(); mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top; });

        function endGame() { gameActive = false; gameOverScreen.style.display = "flex"; }
        function resetGame() {
            let uName = localStorage.getItem("survivorName") || "Moi";
            player = new Player(canvas.width / 2 - 80, canvas.height / 2, uName); 
            campFire = new CampFire(canvas.width / 2, canvas.height / 2);
            trees = []; enemies = []; particles = []; structures = []; woodCount = 0; cycleTimer = 0; isNight = false; nightCounter = 1;
            buildMode = false; buildUi.style.display = "none";
            for (let i = 0; i < 8; i++) spawnTree();
            healthUi.innerText = "❤️ PV: 999"; woodUi.innerText = "🪵 Bois: 0"; fireUi.innerText = "🔥 Feu: 100%"; nightUi.innerText = "☀️ Jour";
            gameActive = true;
        }

        checkAccount();
        gameLoop();
    </script>
</body>
</html>
