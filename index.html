<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99 Nights 2D - Édition Deluxe</title>
    <style>
        body {
            margin: 0;
            background-color: #05070a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .screen {
            position: absolute;
            background: radial-gradient(circle, #111827 0%, #030712 100%);
            width: 900px;
            height: 650px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            border: 2px solid #1f2937;
        }
        .btn {
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin: 8px;
            width: 280px;
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
        }
        .btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
        select, input {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #374151;
            background-color: #1f2937;
            color: white;
            margin: 10px;
            width: 260px;
            text-align: center;
            outline: none;
        }
        #gameUi {
            display: none;
            position: absolute;
            top: 20px;
            justify-content: space-between;
            width: 900px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        canvas {
            border: 4px solid #1f2937;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            cursor: crosshair;
            background-color: #0b1329;
        }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="accountScreen" class="screen" style="display: none;">
        <h2 style="font-size: 32px; color: #60a5fa; margin-bottom: 5px;">Créer ton Profil</h2>
        <p style="color: #9ca3af; margin-bottom: 20px;">Choisis ton pseudo de survivant</p>
        <input type="text" id="usernameInput" placeholder="Ex: Cyborg_99" maxlength="15">
        <button class="btn" onclick="saveAccount()">Sauvegarder et Continuer</button>
    </div>

    <div id="mainMenu" class="screen" style="display: none;">
        <h1 id="welcomeTitle" style="font-size: 42px; margin-bottom: 10px; color: #f3f4f6; letter-spacing: 2px;">99 NIGHTS 2D</h1>
        <p id="playerTag" style="color: #60a5fa; font-weight: bold; margin-bottom: 30px;"></p>
        
        <label for="difficultySelect" style="color: #9ca3af;">Difficulté de la forêt :</label>
        <select id="difficultySelect">
            <option value="easy">Facile (Tranquille & Moins de monstres)</option>
            <option value="normal">Normal (Équilibré)</option>
            <option value="hard">Hard (Pour les pros)</option>
        </select>

        <button class="btn" style="background-color: #10b981;" onclick="startSolo()">Mode Solo</button>
        <button class="btn" style="background-color: #6366f1;" onclick="startMultiplayer()">Lancer Multijoueur</button>
        <button class="btn" style="background-color: #4b5563; width: 220px; font-size: 14px;" onclick="clearAccount()">Changer de compte</button>
    </div>

    <div id="gameUi">
        <div id="healthUi">❤️ PV: 999</div>
        <div id="woodUi">🪵 Bois: 0</div>
        <div id="fireUi">🔥 Feu: 100%</div>
        <div id="nightUi">⏳ État: Jour</div>
        <button class="btn" id="inviteBtn" style="pointer-events: auto; width: 180px; font-size: 12px; padding: 8px; margin: 0; background-color: #f59e0b;" onclick="copyInviteLink()">🔗 Inviter un ami</button>
    </div>

    <div id="gameOverScreen" class="screen" style="display: none;">
        <h1 style="color: #ef4444; font-size: 50px; margin-bottom: 10px;">LA FORÊT VOUS A REPRIS</h1>
        <button class="btn" onclick="location.reload()">Retour au Menu</button>
    </div>

    <canvas id="gameCanvas" width="900" height="650"></canvas>

    <script>
        // /!\ METS TON LIEN RENDER ICI POUR LE MULTI /!\
        const socket = io("https://TON-LIEN-RENDER.onrender.com");

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const healthUi = document.getElementById("healthUi");
        const woodUi = document.getElementById("woodUi");
        const fireUi = document.getElementById("fireUi");
        const nightUi = document.getElementById("nightUi");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const mainMenu = document.getElementById("mainMenu");
        const accountScreen = document.getElementById("accountScreen");

        let gameActive = false;
        let isMultiplayer = false;
        let woodCount = 0;
        let cycleTimer = 0; 
        let isNight = false;
        let nightCounter = 1;
        let spawnTimer = 0;
        let difficulty = "easy";

        const keys = {};
        const mouse = { x: 0, y: 0 };

        let player;
        let otherPlayers = {};
        let campFire;
        let trees = [];
        let enemies = [];
        let particles = [];

        // --- GESTION COMPTE LOCALSTORAGE ---
        function checkAccount() {
            let savedName = localStorage.getItem("survivorName");
            if (!savedName) {
                accountScreen.style.display = "flex";
            } else {
                document.getElementById("playerTag").innerText = `👤 Joueur : ${savedName}`;
                mainMenu.style.display = "flex";
            }
        }

        function saveAccount() {
            let nameInput = document.getElementById("usernameInput").value.trim();
            if(nameInput === "") {
                alert("Mets un vrai pseudo !");
                return;
            }
            localStorage.setItem("survivorName", nameInput);
            accountScreen.style.display = "none";
            checkAccount();
        }

        function clearAccount() {
            localStorage.removeItem("survivorName");
            mainMenu.style.display = "none";
            checkAccount();
        }

        // --- ENVOI D'INVITATION ---
        function copyInviteLink() {
            let currentUrl = window.location.href.split('?')[0]; 
            // On ajoute un faux paramètre de room pour faire stylé ou gérer des salons plus tard
            let inviteUrl = `${currentUrl}?room=forest-${Math.floor(Math.random()*1000)}`;
            navigator.clipboard.writeText(inviteUrl);
            alert("Lien d'invitation copié ! Envoie-le à ton pote.");
        }

        class Player {
            constructor(x, y, name = "Moi", color = "#3b82f6") {
                this.x = x; this.y = y;
                this.radius = 16; this.speed = 6.5; this.hp = 999;
                this.angle = 0; this.tool = 'axe';
                this.color = color; this.name = name;
                this.isSwinging = false; this.swingAngle = 0; this.swingDir = 1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Pseudo au-dessus du joueur
                ctx.fillStyle = "white";
                ctx.font = "bold 12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(this.name, 0, -this.radius - 8);

                ctx.rotate(this.angle);
                
                // Ombre douce intégrée
                ctx.beginPath(); ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.arc(3, 3, this.radius, 0, Math.PI * 2); ctx.fill();

                // Corps principal du Cyborg
                ctx.beginPath(); ctx.fillStyle = this.color; ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
                // Casque / Viseur néon horizontal
                ctx.fillStyle = "#60a5fa"; ctx.fillRect(4, -4, 10, 8);

                if (this.tool === 'axe') {
                    ctx.save();
                    if (this.isSwinging) ctx.rotate(this.swingAngle);
                    ctx.fillStyle = "#b45309"; ctx.fillRect(10, -3, 22, 5);
                    ctx.fillStyle = "#cbd5e1"; ctx.fillRect(26, -11, 8, 18);
                    ctx.restore();
                } else {
                    ctx.fillStyle = "#1f2937"; ctx.fillRect(5, -5, 26, 10);
                    ctx.fillStyle = "#38bdf8"; ctx.fillRect(27, -2, 6, 4); // Canon laser bleu azur
                }
                ctx.restore();
            }

            update() {
                let oldX = this.x, oldY = this.y;

                if (keys['z'] || keys['w'] || keys['arrowup']) this.y -= this.speed;
                if (keys['s'] || keys['arrowdown']) this.y += this.speed;
                if (keys['q'] || keys['a'] || keys['arrowleft']) this.x -= this.speed;
                if (keys['d'] || keys['arrowright']) this.x += this.speed;

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);

                if (isMultiplayer && (oldX !== this.x || oldY !== this.y)) {
                    socket.emit('playerMovement', { x: this.x, y: this.y, angle: this.angle, tool: this.tool });
                }

                if (this.isSwinging) {
                    this.swingAngle += 0.25 * this.swingDir;
                    if (this.swingAngle > 1.2) this.swingDir = -1;
                    if (this.swingAngle < -0.5) { this.isSwinging = false; this.swingAngle = 0; this.swingDir = 1; }
                }
            }
        }

        class CampFire {
            constructor(x, y) { this.x = x; this.y = y; this.radius = 24; this.fuel = 100; }
            draw() {
                let gradient = ctx.createRadialGradient(this.x, this.y, 5, this.x, this.y, this.fuel * 2.8);
                gradient.addColorStop(0, `rgba(249, 115, 22, ${isNight ? 0.5 : 0.25})`);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(this.x, this.y, this.fuel * 2.8, 0, Math.PI * 2); ctx.fill();
                
                // Pierres décoratives autour du feu
                ctx.fillStyle = "#4b5563";
                for(let i=0; i<8; i++) {
                    let ang = (i * Math.PI) / 4;
                    ctx.beginPath(); ctx.arc(this.x + Math.cos(ang)*22, this.y + Math.sin(ang)*22, 5, 0, Math.PI*2); ctx.fill();
                }

                ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius - 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(this.x, this.y, (this.radius - 4)*0.6, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                let burnRate = 0.015;
                if(difficulty === "hard") burnRate = 0.05;
                if (this.fuel > 0) this.fuel -= isNight ? burnRate * 2 : burnRate;
                fireUi.innerText = `🔥 Feu: ${Math.floor(this.fuel)}%`;
            }
        }

        class Tree {
            constructor(x, y) { this.x = x; this.y = y; this.radius = 32; this.hp = 2; }
            draw() {
                // Ombre déportée de l'arbre au sol
                ctx.beginPath(); ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.arc(this.x + 8, this.y + 12, this.radius, 0, Math.PI * 2); ctx.fill();
                // Tronc
                ctx.beginPath(); ctx.fillStyle = "#451a03"; ctx.arc(this.x, this.y, 12, 0, Math.PI * 2); ctx.fill();
                // Feuillage dégradé plus réaliste
                ctx.beginPath(); ctx.fillStyle = "#065f46"; ctx.arc(this.x, this.y - 4, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.fillStyle = "#059669"; ctx.arc(this.x - 3, this.y - 8, this.radius * 0.75, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Enemy {
            constructor(x, y) { 
                this.x = x; this.y = y; this.radius = 14; 
                // Ajustement vitesse selon difficulté
                this.speed = difficulty === "easy" ? 1.2 : (difficulty === "normal" ? 2.2 : 3.2); 
                this.hp = 20; 
            }
            draw() {
                // Effet de lueur sous l'ennemi
                ctx.beginPath(); ctx.fillStyle = "rgba(147, 51, 234, 0.2)"; ctx.arc(this.x, this.y, this.radius+4, 0, Math.PI*2); ctx.fill();
                
                ctx.beginPath(); ctx.fillStyle = "#9333ea"; ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(this.x - 4, this.y - 2, 2.5, 0, Math.PI * 2); ctx.arc(this.x + 4, this.y - 2, 2.5, 0, Math.PI * 2); ctx.fill(); // Yeux jaunes maléfiques
            }
            update() {
                let dx = player.x - this.x, dy = player.y - this.y, dist = Math.hypot(dx, dy);
                if (dist > 5) { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
                if (dist < this.radius + player.radius) {
                    player.hp -= difficulty === "easy" ? 0.5 : 2;
                    healthUi.innerText = `❤️ PV: ${Math.max(0, Math.floor(player.hp))}`;
                    if (player.hp <= 0) endGame();
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 2.5 + 1;
                this.dx = (Math.random() - 0.5) * 4; this.dy = (Math.random() - 0.5) * 4;
                this.alpha = 1; this.decay = 0.025;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
            update() { this.x += this.dx; this.y += this.dy; this.alpha -= this.decay; }
        }

        function createExplosion(x, y, color) { for (let i = 0; i < 6; i++) particles.push(new Particle(x, y, color)); }
        function spawnTree() { trees.push(new Tree(Math.random() * 800 + 50, Math.random() * 550 + 50)); }

        // --- COUPS D'ENVOI ---
        function applyDifficultySettings() {
            difficulty = document.getElementById("difficultySelect").value;
        }

        function startSolo() {
            applyDifficultySettings();
            mainMenu.style.display = "none";
            document.getElementById("gameUi").style.display = "flex";
            isMultiplayer = false;
            resetGame();
        }

        function startMultiplayer() {
            applyDifficultySettings();
            mainMenu.style.display = "none";
            document.getElementById("gameUi").style.display = "flex";
            isMultiplayer = true;
            resetGame();
        }

        // --- RESEAU ---
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) otherPlayers[id] = new Player(players[id].x, players[id].y, "Allié", "#10b981");
            });
        });
        socket.on('newPlayer', (p) => { otherPlayers[p.id] = new Player(p.x, p.y, "Allié", "#10b981"); });
        socket.on('playerMoved', (p) => { if (otherPlayers[p.id]) { otherPlayers[p.id].x = p.x; otherPlayers[p.id].y = p.y; otherPlayers[p.id].angle = p.angle; otherPlayers[p.id].tool = p.tool; } });
        socket.on('playerActionTriggered', (d) => { if (otherPlayers[d.id] && d.action === 'swing') otherPlayers[d.id].isSwinging = true; });
        socket.on('playerDisconnected', (id) => delete otherPlayers[id]);

        // --- GAME LOOP ---
        function gameLoop() {
            // Sol façon forêt herbeuse foncée
            ctx.fillStyle = "#09111e"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                cycleTimer++;
                if (cycleTimer > 900) {
                    isNight = !isNight; cycleTimer = 0;
                    if (isNight) {
                        player.tool = 'gun'; nightUi.innerText = `🌙 Nuit ${nightCounter}`; nightUi.style.color = "#a855f7";
                    } else {
                        player.tool = 'axe'; nightCounter++; nightUi.innerText = `☀️ Jour`; nightUi.style.color = "#f59e0b";
                        while(trees.length < 5) spawnTree();
                    }
                }

                // Apparition beaucoup plus lente/rare en mode Facile
                if (isNight) {
                    spawnTimer++;
                    let spawnRate = difficulty === "easy" ? 90 : (difficulty === "normal" ? 45 : 20);
                    if (spawnTimer > spawnRate) { 
                        enemies.push(new Enemy(Math.random() * canvas.width, -20)); 
                        spawnTimer = 0; 
                    }
                }

                campFire.update(); campFire.draw();
                trees.forEach(tree => tree.draw());
                
                Object.keys(otherPlayers).forEach((id) => otherPlayers[id].draw());
                player.update(); player.draw();

                for (let i = enemies.length - 1; i >= 0; i--) { enemies[i].update(); enemies[i].draw(); }
                for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].alpha <= 0) particles.splice(i, 1); }

                // Filtre obscurité ajusté
                if (isNight) {
                    ctx.fillStyle = "rgba(3, 7, 18, 0.55)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousedown', () => {
            if (!gameActive) return;
            if (isMultiplayer) socket.emit('playerAction', { action: 'swing' });

            if (!isNight) {
                player.isSwinging = true;
                if (Math.hypot(campFire.x - player.x, campFire.y - player.y) < 60 && woodCount > 0) {
                    woodCount--; campFire.fuel = Math.min(100, campFire.fuel + 20);
                    woodUi.innerText = `🪵 Bois: ${woodCount}`; return;
                }
                for (let i = trees.length - 1; i >= 0; i--) {
                    if (Math.hypot(trees[i].x - player.x, trees[i].y - player.y) < 55) {
                        trees[i].hp--; createExplosion(trees[i].x, trees[i].y, "#92400e");
                        if (trees[i].hp <= 0) { trees.splice(i, 1); woodCount += 3; woodUi.innerText = `🪵 Bois: ${woodCount}`; }
                        break;
                    }
                }
            } else {
                // Tirs lasers instantanés et puissants
                createExplosion(player.x + Math.cos(player.angle)*25, player.y + Math.sin(player.angle)*25, "#38bdf8");
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let diffAngle = Math.abs(player.angle - Math.atan2(enemies[i].y - player.y, enemies[i].x - player.x));
                    if (diffAngle < 0.35 && Math.hypot(enemies[i].x - player.x, enemies[i].y - player.y) < 380) {
                        createExplosion(enemies[i].x, enemies[i].y, "#a855f7");
                        enemies.splice(i, 1); break;
                    }
                }
            }
        });

        function endGame() { gameActive = false; gameOverScreen.style.display = "flex"; }
        function resetGame() {
            let uName = localStorage.getItem("survivorName") || "Moi";
            player = new Player(canvas.width / 2 - 80, canvas.height / 2, uName); 
            campFire = new CampFire(canvas.width / 2, canvas.height / 2);
            trees = []; enemies = []; particles = []; woodCount = 0; cycleTimer = 0; isNight = false; nightCounter = 1;
            for (let i = 0; i < 7; i++) spawnTree();
            healthUi.innerText = "❤️ PV: 999"; woodUi.innerText = "🪵 Bois: 0"; fireUi.innerText = "🔥 Feu: 100%"; nightUi.innerText = "☀️ Jour";
            gameActive = true;
        }

        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener('mousemove', (e) => { const rect = canvas.getBoundingClientRect(); mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top; });
        
        // Initialisation du compte au chargement
        checkAccount();
        gameLoop();
    </script>
</body>
</html>
